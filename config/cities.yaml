# Rhythmscape city manifest — synchronic 4-city comparison
#
# Each city block mirrors the structure previously held in `config/tago.yaml`
# (legacy, Changwon-only). Scheduler / resolve_routes / launchd generator
# accept `--city <slug>` and read the matching block here.
#
# Changwon's entry duplicates config/tago.yaml so that the currently running
# launchd jobs (which reference `--config config/tago.yaml`) are unaffected.
# Later cleanup can migrate Changwon jobs to `--city changwon` and retire
# `config/tago.yaml`. Do NOT edit config/tago.yaml without coordinating a
# launchd reload — Changwon collection is live.

collection:
  window_start: "07:00"
  window_end: "19:00"
  timezone: Asia/Seoul
  poll_interval_sec: 60
  http_timeout_sec: 10
  retry_attempts: 3

limits:
  daily_call_budget_per_city: 2160
  hard_quota_code: "22"
  unregistered_key_code: "30"

storage:
  raw_base: data/raw/tago
  processed_base: data/processed/tago
  checkpoint_dir: data/checkpoints/tago
  logs_dir: logs/tago
  parquet_compression: snappy

observability:
  log_level: INFO
  log_format: json
  log_rotation_daily: true

reproducibility:
  random_seed: 42
  record_params_path: data/processed/tago/provenance/{city}_{date}.json

cities:
  # ---------------------------------------------------------------------------
  # Changwon — flagship. Live since 2026-04-22 22:00 KST under config/tago.yaml.
  # Do not edit while launchd job com.rhythmscape.tago-batch.tick is loaded.
  # ---------------------------------------------------------------------------
  changwon:
    city_name: changwon
    city_code: 38010
    theme_label: 창원 (플래그십)
    api_base: https://apis.data.go.kr/1613000
    api_key_env: TAGO_API_KEY
    routes:
      - routeid: CWB379002710
        route_no: "271"
        route_type: 지선/순환
        theoretical_role: 마산합포 박물관 루프 — 도심 내부 리듬
      - routeid: CWB379060000
        route_no: BRT6000
        route_type: 좌석/BRT급행
        theoretical_role: 성주사역↔덕동 — automobility 포획 사례
      - routeid: CWB379007100
        route_no: "710"
        route_type: 좌석
        theoretical_role: 불모산↔마산대 — 광역 부재의 증상적 대체

  # ---------------------------------------------------------------------------
  # Seongnam Bundang — 수도권 민간 자본 신도시 (add-city §1, 2026-04-23).
  # Replaces original Seoul Gangnam slot after TAGO Seoul absence confirmed.
  # ---------------------------------------------------------------------------
  seongnam_bundang:
    city_name: seongnam_bundang
    city_code: 31020
    theme_label: 성남 분당 (신도시+판교)
    api_base: https://apis.data.go.kr/1613000
    api_key_env: TAGO_API_KEY
    routes:
      - routeid: GGB228000179
        route_no: "101"
        route_type: 일반버스
        theoretical_role: 분당 central spine 간선 (오리↔수서) — automobility 포획
      - routeid: GGB204000024
        route_no: "9407"
        route_type: 직행좌석버스
        theoretical_role: 분당→강남 직행좌석 — 특권 통근 회랑, 창원 710의 과잉형 대응
      - routeid: GGB204000146
        route_no: 누리2
        route_type: 일반버스
        theoretical_role: 분당 내부 고밀도 생활 리듬 — 창원 271의 혼잡형 대응

  # ---------------------------------------------------------------------------
  # Sejong — administrative capital, 2010s-generation planned city (add-city §2).
  # Observation (Cowork 2026-04-23 14:00): B2 and 1004 are both classified as
  # 광역버스 ("wide-area bus") in TAGO's routetp field. This is not incidental —
  # Sejong's "regional integration premise" is inscribed into the taxonomy
  # itself: even routes that stay inside Sejong city limits (B2) are labelled
  # 광역 because the design presumes Daejeon/Cheongju spillover. Archive for
  # the Day 3–4 bilingual brief.
  # ---------------------------------------------------------------------------
  sejong:
    city_name: sejong
    city_code: 12
    theme_label: 세종 (행정중심 신도시)
    api_base: https://apis.data.go.kr/1613000
    api_key_env: TAGO_API_KEY
    # Day 3 오전 variant 교체 (2026-04-24):
    # - B2: SJB293000362 (minor early-morning, 7 dispatches 0500-0600)
    #        → SJB293000077 (main full-day, 145 dispatches 0600-2423, 대전월드컵↔오송)
    # - 551: SJB293000030 (1-hour minor, 0600-0700)
    #        → SJB293000029 (routeno 550, 12 dispatches 0730-2200, 산성동↔조치원역)
    # - 1004: unchanged (SJB293000178 was already main service, 62 dispatches)
    # 교체 근거: Day 2 pick 시 bbox coverage만 보고 선정하여 실제 운영 scope
    # 고려 못함. tick window (07:00-19:59) overlap 복구가 교체 목표.
    routes:
      - routeid: SJB293000077
        route_no: B2
        route_type: 광역버스
        theoretical_role: 세종 BRT 메인 (대전월드컵↔오송역, 145 dispatches/day) — 계획 단계 통합 BRT, 창원 BRT6000의 "덧붙여짐"과 대조
      - routeid: SJB293000178
        route_no: "1004"
        route_type: 광역버스
        theoretical_role: 반석역(대전유성)↔장기중학교(세종4생활권) — 광역 기능 연계 필수성, 창원 710의 반대 극
      - routeid: SJB293000029
        route_no: "550"
        route_type: 일반버스
        theoretical_role: 산성동↔조치원역 (550, 12 dispatches/day) — 구시가 잔여 지선, 창원 271과 방향 상반·위상 동일

  # ---------------------------------------------------------------------------
  # Busan Yeongdo — 반도-섬, 2-bridge bottleneck, pre-plan accretion (add-city §3).
  # TAGO exposes only 부산광역시 (citycode 21) at city level; Yeongdo-gu routes
  # are selected by requiring ≥30% of route_stations to fall inside the Yeongdo
  # bbox (lat 35.055-35.110, lon 129.025-129.100). OSM polygon available at
  # data/processed/osm/busan_yeongdo.pbf for future PRM refinement.
  #
  # Two Day-2 theoretical findings recorded here for the Day 3-4 bilingual brief:
  #
  # (1) regional_fix 축 4변주 완성: 창원 710(결핍) · 성남 9407(특권) ·
  #     세종 1004(필수성) · 영도 113(지형적 왜곡). 4도시가 각각 독립적 이론
  #     위치 점유 — 단일 축의 네 양상이 공시적 비교의 단단한 뼈대.
  #
  # (2) automobility_capture 정류소 스케일 차이: 창원 BRT6000(77) ·
  #     세종 B2(15) · 영도 8(89). 정류소 수 자체가 공간 구조의 흔적이다 —
  #     세종은 계획-통합 BRT의 압축 배치, 영도는 병목을 우회하는 긴 해안
  #     루트, 창원은 1970s 격자 위에 덧씌워진 중간치.
  # ---------------------------------------------------------------------------
  busan_yeongdo:
    city_name: busan_yeongdo
    city_code: 21
    theme_label: 부산 영도 (반도 지형)
    api_base: https://apis.data.go.kr/1613000
    api_key_env: TAGO_API_KEY
    routes:
      - routeid: BSB5200008000
        route_no: "8"
        route_type: 일반버스
        theoretical_role: 태종대↔서부터미널 — 영도대교 관통 도심 연결, 병목이 있는 BRT (창원 BRT6000의 변형)
      - routeid: BSB5200113000
        route_no: "113"
        route_type: 일반버스
        theoretical_role: 영도중리↔신평(사하구) — 광역의 지형적 왜곡, regional_fix 4변주의 제3극
      - routeid: BSB5290407000
        route_no: 영도구7
        route_type: 마을버스
        theoretical_role: 청학동시장↔동삼그린힐 — 지형 잔여 극치, 봉래산이 허용하지 않은 규모
